name: Daily Price Intelligence Automation

on:
  schedule:
    # Triggers every day at 07:00 UTC (which is exactly 9:00 AM Egypt Time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allows you or any developer to click a manual "Run Now" button on GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Install Google Chrome Engine (For Web Scraping)
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install App Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Price Intelligence Bot
      env:
        # Securely injection keys from GitHub Secrets into the machine memory
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TARGET_PRODUCT_URL: ${{ secrets.TARGET_PRODUCT_URL }}
      run: |
        # Write the temporary Google Sheets JSON access badge file from the secret repository value
        echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json
        python main.py